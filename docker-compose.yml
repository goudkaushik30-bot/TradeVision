version: '3.9'

networks:
  tradevision-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: tradevision-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: userdb,stockdb,tradedb,portfoliodb,alertdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "5432:5432"
    networks:
      - tradevision-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tradevision-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - tradevision-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: tradevision-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - tradevision-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tradevision-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - tradevision-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Microservices ─────────────────────────────────────────────────────────

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: tradevision-user-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_NAME: userdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-tradevision-production-secret-key-256-bits-min}
      PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - tradevision-net
    restart: unless-stopped

  stock-service:
    build:
      context: ./stock-service
      dockerfile: Dockerfile
    container_name: tradevision-stock-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_NAME: stockdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-tradevision-production-secret-key-256-bits-min}
      PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - tradevision-net
    restart: unless-stopped

  trade-service:
    build:
      context: ./trade-service
      dockerfile: Dockerfile
    container_name: tradevision-trade-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_NAME: tradedb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-tradevision-production-secret-key-256-bits-min}
      PORT: 8083
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - tradevision-net
    restart: unless-stopped

  portfolio-service:
    build:
      context: ./portfolio-service
      dockerfile: Dockerfile
    container_name: tradevision-portfolio-service
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres
      DB_NAME: portfoliodb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-tradevision-production-secret-key-256-bits-min}
      PORT: 8084
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - tradevision-net
    restart: unless-stopped

  alert-service:
    build:
      context: ./alert-service
      dockerfile: Dockerfile
    container_name: tradevision-alert-service
    ports:
      - "8085:8085"
    environment:
      DB_HOST: postgres
      DB_NAME: alertdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-tradevision-production-secret-key-256-bits-min}
      PORT: 8085
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - tradevision-net
    restart: unless-stopped

  # ─── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradevision-frontend
    ports:
      - "4200:80"
    depends_on:
      - user-service
      - stock-service
      - trade-service
      - portfolio-service
      - alert-service
    networks:
      - tradevision-net
    restart: unless-stopped
