apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradevision-ingress
  namespace: tradevision
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: tradevision.example.com
      http:
        paths:
          # Frontend
          - path: /(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

          # User Service — auth + users
          - path: /api/auth(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          - path: /api/users(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081

          # Stock Service
          - path: /api/stocks(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: stock-service
                port:
                  number: 8082

          # Trade Service
          - path: /api/trades(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: trade-service
                port:
                  number: 8083

          # Portfolio Service
          - path: /api/portfolio(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: portfolio-service
                port:
                  number: 8084

          # Alert Service
          - path: /api/alerts(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: alert-service
                port:
                  number: 8085
