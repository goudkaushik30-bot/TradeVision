apiVersion: v1
kind: ConfigMap
metadata:
  name: tradevision-config
  namespace: tradevision
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_USERNAME: "postgres"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  KAFKA_SERVERS: "kafka-service:9092"
---
apiVersion: v1
kind: Secret
metadata:
  name: tradevision-secrets
  namespace: tradevision
type: Opaque
stringData:
  DB_PASSWORD: "postgres"
  JWT_SECRET: "tradevision-production-secret-key-must-be-256-bits-minimum-length"
