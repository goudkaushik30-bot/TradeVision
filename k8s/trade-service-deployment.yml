apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-service
  namespace: tradevision
  labels:
    app: trade-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trade-service
  template:
    metadata:
      labels:
        app: trade-service
    spec:
      containers:
        - name: trade-service
          image: tradevision/trade-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: tradevision-config
          env:
            - name: DB_NAME
              value: "tradedb"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tradevision-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tradevision-secrets
                  key: JWT_SECRET
            - name: PORT
              value: "8083"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: trade-service
  namespace: tradevision
spec:
  selector:
    app: trade-service
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trade-service-hpa
  namespace: tradevision
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trade-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
